site_name: Bonsai House · 3 сезон
site_description: Википедия ванилла++ сервера Bonsai House — механики, крафты, зачарования и правила.
site_author: Bonsai House
site_url: https://wiki.bonsaihouse.ru/

docs_dir: docs
copyright: Bonsai House Wiki

theme:
  name: material
  language: ru
  custom_dir: overrides
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Manrope
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips

extra:
  generator: false
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/Snaqmue5zH
      name: Discord
    - icon: fontawesome/brands/tiktok
      link: https://www.tiktok.com/@r0o0mbik
      name: TikTok

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Ссылка на раздел
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark

plugins:
  - search:
      lang:
        - ru
        - en

nav:
  - 🏠 Главная: index.md
  - ℹ️ Информация:
      - 🌳 О сервере: info/server-info.md
      - 🍃 Валюта — Листочки: info/currency.md
  - 🗺️ Генерация мира:
      - 🌍 Оверворлд: world-generation/overworld.md
      - 🔥 Нижний мир: world-generation/nether.md
      - 🌌 Энд: world-generation/end.md
  - 🏃 Передвижение:
      - 🐎 Призыв маунта: movement/mount-summoning.md
      - 💨 Быстрые гасты: movement/swift-ghasts.md
      - 🧵 Канаты и зиплайны: movement/ropes-ziplines.md
      - 🧪 Зелье Возврата: movement/return-potion.md
  - ⚒️ Крафты:
      - 🧱 Улучшенный камнерез: crafting/improved-stonecutter.md
      - 🛠️ Новые крафты: crafting/new-crafts.md
      - 🍲 Улучшение котла: crafting/cauldron-upgrade.md
      - 🔄 Разжатие блоков: crafting/uncompression.md
      - 🌊 Кораллы: crafting/coral-crafting.md
      - ✨ Кристалл Края: crafting/end-crystal-craft.md
      - ⛏️ Зелье шахтёра: crafting/miner-potion.md
  - ⚡ Зачарования:
      - 📖 Усиление чар: enchantments/enchantment-levels.md
      - 🛡️ Эффекты брони: enchantments/armor-effects.md
  - 🌟 Уникальные зачарования:
      - 🌾 Фермер: unique-enchantments/farmer.md
  - 🎁 Уникальные предметы:
      - 🎩 Шляпа лета: unique-items/summer-hat.md
  - 🎨 Ресурспаки:
      - 📦 Обязательные ресурспаки: resource-packs/required.md
      - 🗡️ Скины оружия: resource-packs/weapon-skins.md
      - 🍽️ KSEPSP: resource-packs/kseps.md
  - 🧩 Моды: mods/mods.md
  - 🗃️ Разное:
      - ☀️ Аномально жаркий день: misc/hot-day.md
      - ⚙️ Улучшитель спавнеров: misc/spawner-upgrader.md
      - 💀 Тотем бессмертия: misc/totem-of-immortality.md
      - 📝 Подписывание предметов: misc/item-signing.md
      - 💰 Торговля с бронником: misc/armorer-trading.md
      - 🎵 Музыка на пластинках: misc/custom-music.md
  - 📜 Правила:
      - ⚖️ Правила сервера: rules/general-rules.md
